name: Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: aqw-pocket-build

jobs:
  prepare:
    name: Prepare Preview Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      apk_artifact_name: ${{ steps.meta.outputs.apk_artifact_name }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
      linux_artifact_name: ${{ steps.meta.outputs.linux_artifact_name }}
      linux_appimage_name: ${{ steps.meta.outputs.linux_appimage_name }}
    steps:
      - name: Compute preview metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_SHA: ${{ github.event.merge_group.head_sha }}
          RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SHORT_SHA="${PR_HEAD_SHA:0:7}"
            TAG_VERSION="pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            HEAD_SHA="${MERGE_GROUP_SHA:-$GITHUB_SHA_VALUE}"
            SHORT_SHA="${HEAD_SHA:0:7}"
            TAG_VERSION="merge-group-${SHORT_SHA}"
          fi

          APP_VERSION="1.0.${RUN_NUMBER}"

          APK_NAME="AQWPocket-${TAG_VERSION}.apk"
          APK_ARTIFACT_NAME="$APK_NAME"

          LINUX_APPIMAGE_NAME="AQWPocket-${TAG_VERSION}-x86_64.AppImage"
          LINUX_ARTIFACT_NAME="$LINUX_APPIMAGE_NAME"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_artifact_name=${APK_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "linux_appimage_name=${LINUX_APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "linux_artifact_name=${LINUX_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

  build_universal_preview:
    name: Build Universal Preview APK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate preview signing keystore
        run: |
          mkdir -p .signing
          docker run --rm \
            -v "$PWD/.signing:/signing" \
            "$DOCKER_IMAGE" \
            keytool -genkeypair \
              -alias preview \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650 \
              -keystore /signing/pr-preview.jks \
              -storepass previewpass \
              -keypass previewpass \
              -dname "CN=AQW Pocket Preview, OU=CI, O=GitHub Actions, L=Unknown, S=Unknown, C=US"

      - name: Inject preview version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app.xml

      - name: Build AAB preview
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e KEYSTORE_PATH=/workspace/.signing/pr-preview.jks \
            -e KEY_ALIAS=preview \
            -e KEYSTORE_PASS=previewpass \
            -e KEY_PASS=previewpass \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              echo "[1/5] Patching latest Game.swf..."
              java scripts/patch.java
              echo "[2/5] Preparing loader gamefiles..."
              mkdir -p app/gamefiles && cp assets/Game.swf app/gamefiles/Game.swf
              echo "[3/5] Building foreground ANE..."
              mkdir -p ane/build/as3/core ane/build/android/classes ane/build/android-dist app/extensions
              rm -rf ane/build/android-dist/res
              if [ -d ane/android/res ]; then cp -R ane/android/res ane/build/android-dist/res; fi
              cp app/src/core/ForegroundService.as ane/build/as3/core/ForegroundService.as
              compc -source-path ane/build/as3 -include-classes core.ForegroundService \
                -swf-version=23 -output ane/build/foreground.swc
              javac --release 8 \
                -cp "$ANDROID_JAR:$AIR_HOME/lib/android/FlashRuntimeExtensions.jar" \
                -d ane/build/android/classes ane/android/src/com/aqw/foreground/*.java
              jar cf ane/build/foreground-ext.jar -C ane/build/android/classes .
              java scripts/tools.java extract-library-swf \
                ane/build/foreground.swc ane/build/android-dist/library.swf
              cp ane/build/foreground-ext.jar ane/build/android-dist/foreground-ext.jar
              cp ane/extension.xml ane/build/extension.xml
              cp ane/platform-android.xml ane/build/android-dist/platform.xml
              adt -package -target ane ane/build/foreground.ane ane/build/extension.xml \
                -swc ane/build/foreground.swc \
                -platform Android-ARM -platformoptions ane/build/android-dist/platform.xml \
                  -C ane/build/android-dist foreground-ext.jar library.swf res \
                -platform Android-ARM64 -platformoptions ane/build/android-dist/platform.xml \
                  -C ane/build/android-dist foreground-ext.jar library.swf res
              cp ane/build/foreground.ane app/extensions/foreground.ane
              echo "[4/5] Compiling Loader.swf..."
              amxmlc -external-library-path+=app/extensions/foreground.ane \
                -output app/Loader.swf app/src/Main.as
              echo "[5/5] Building AAB..."
              mkdir -p build
              ICONS="icons/android-icon-36x36.png icons/android-icon-48x48.png icons/android-icon-72x72.png icons/android-icon-96x96.png icons/android-icon-144x144.png icons/android-icon-192x192.png"
              adt -package -target aab \
                -storetype JKS -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASS" -keypass "$KEY_PASS" \
                build/AQWPocket.aab app/app.xml -extdir app/extensions \
                -C app Loader.swf $ICONS gamefiles/Game.swf \
                -platformsdk "$ANDROID_SDK_ROOT"
              echo "Done."
            '

      - name: Normalize AAB native library compression
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            java scripts/tools.java normalize-aab build/AQWPocket.aab build/AQWPocket-normalized.aab

      - name: Build universal APK from normalized AAB
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            sh -c "
              java -jar \$BUNDLETOOL_JAR build-apks \
                --bundle=build/AQWPocket-normalized.aab \
                --output=build/AQWPocket.apks \
                --mode=universal \
                --ks=/workspace/.signing/pr-preview.jks \
                --ks-key-alias=preview \
                --ks-pass=pass:previewpass \
                --key-pass=pass:previewpass &&
              unzip -p build/AQWPocket.apks universal.apk > \"build/${{ needs.prepare.outputs.apk_name }}\" &&
              rm -f build/AQWPocket.apks build/AQWPocket-normalized.aab
            "

      - name: Inspect preview APK
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            java scripts/tools.java inspect-native-libs "build/${{ needs.prepare.outputs.apk_name }}"

      - name: Clean signing keystore
        if: always()
        run: rm -rf .signing

      - name: Upload preview APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.apk_artifact_name }}
          path: build/${{ needs.prepare.outputs.apk_name }}
          archive: false
          if-no-files-found: error
          retention-days: 7

  build_linux_preview:
    name: Build Linux Preview AppImage
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inject preview version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-linux.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-linux.xml

      - name: Build Linux AppImage
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e APPIMAGE_NAME="$APPIMAGE_NAME" \
            --privileged \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              RUNTIME="$AIR_HOME/runtimes/air/linux-x64"
              BUNDLE="build/AQWPocket-linux"

              echo "[1/5] Patching latest Game.swf..."
              java scripts/patch.java
              echo "[2/5] Preparing loader gamefiles..."
              mkdir -p app/gamefiles && cp assets/Game.swf app/gamefiles/Game.swf
              echo "[3/5] Compiling Loader.swf (linux)..."
              amxmlc -output app/Loader.swf app/src/Main.as

              echo "[4/5] Assembling AIR bundle..."
              mkdir -p build && rm -rf "$BUNDLE"
              mkdir -p "$BUNDLE/META-INF/AIR"
              cp -a "$RUNTIME/Adobe AIR" "$BUNDLE/"
              cp "$RUNTIME/Adobe AIR/Versions/1.0/Resources/captiveappentry" "$BUNDLE/AQWPocket"
              chmod +x "$BUNDLE/AQWPocket"
              cp app/Loader.swf "$BUNDLE/Loader.swf"
              cp app/app-linux.xml "$BUNDLE/META-INF/AIR/application.xml"
              cp linux/license.txt "$BUNDLE/META-INF/AIR/license.txt"
              echo -n "application/vnd.adobe.air-application-installer-package+zip" > "$BUNDLE/mimetype"
              mkdir -p "$BUNDLE/icons"
              for sz in 36 48 72 96 144 192; do
                cp "app/icons/android-icon-${sz}x${sz}.png" "$BUNDLE/icons/android-icon-${sz}x${sz}.png"
              done
              mkdir -p "$BUNDLE/gamefiles"
              cp app/gamefiles/Game.swf "$BUNDLE/gamefiles/Game.swf"

              echo "[5/5] Creating AppImage..."
              mkdir -p build/AQWPocket.AppDir/lib
              cp -a "$BUNDLE" build/AQWPocket.AppDir/AQWPocket-linux
              cp linux/AppRun build/AQWPocket.AppDir/AppRun
              chmod +x build/AQWPocket.AppDir/AppRun
              cp linux/AQWPocket.desktop build/AQWPocket.AppDir/AQWPocket.desktop
              cp app/icons/android-icon-192x192.png build/AQWPocket.AppDir/AQWPocket.png
              EXCLUDE="linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|libpthread|librt\.so|libresolv|libgcc_s|libstdc\+\+"
              CORE_SO="build/AQWPocket.AppDir/AQWPocket-linux/Adobe AIR/Versions/1.0/libCore.so"
              ldd "$CORE_SO" | grep "=> /" | grep -vE "$EXCLUDE" | awk "{print \$3}" | sort -u | while read lib; do
                cp -n "$lib" build/AQWPocket.AppDir/lib/ 2>/dev/null || true
              done
              echo "Bundled $(ls build/AQWPocket.AppDir/lib/ | wc -l) shared libraries"
              ARCH=x86_64 $APPIMAGETOOL build/AQWPocket.AppDir "build/$APPIMAGE_NAME"
              rm -rf build/AQWPocket-linux build/AQWPocket.AppDir
              echo "Done."
            '
        env:
          APPIMAGE_NAME: ${{ needs.prepare.outputs.linux_appimage_name }}

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.linux_artifact_name }}
          path: build/${{ needs.prepare.outputs.linux_appimage_name }}
          archive: false
          if-no-files-found: error
          retention-days: 7

  preview_status:
    name: Preview
    runs-on: ubuntu-latest
    needs: [build_universal_preview, build_linux_preview]
    if: always()
    steps:
      - name: Fail when preview pipeline fails
        run: |
          if [ "${{ needs.build_universal_preview.result }}" != "success" ]; then
            echo "Preview APK build failed."
            exit 1
          fi

          if [ "${{ needs.build_linux_preview.result }}" != "success" ]; then
            echo "Preview Linux AppImage build failed."
            exit 1
          fi

          echo "All preview builds succeeded."

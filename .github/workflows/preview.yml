name: Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: aqw-pocket-build

jobs:
  prepare:
    name: Prepare Preview Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      apk_artifact_name: ${{ steps.meta.outputs.apk_artifact_name }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
      linux_artifact_name: ${{ steps.meta.outputs.linux_artifact_name }}
      linux_appimage_name: ${{ steps.meta.outputs.linux_appimage_name }}
      windows_artifact_name: ${{ steps.meta.outputs.windows_artifact_name }}
      windows_exe_name: ${{ steps.meta.outputs.windows_exe_name }}
    steps:
      - name: Compute preview metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_SHA: ${{ github.event.merge_group.head_sha }}
          RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SHORT_SHA="${PR_HEAD_SHA:0:7}"
            TAG_VERSION="pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            HEAD_SHA="${MERGE_GROUP_SHA:-$GITHUB_SHA_VALUE}"
            SHORT_SHA="${HEAD_SHA:0:7}"
            TAG_VERSION="merge-group-${SHORT_SHA}"
          fi

          APP_VERSION="1.0.${RUN_NUMBER}"

          APK_NAME="AQWPocket-${TAG_VERSION}.apk"
          APK_ARTIFACT_NAME="$APK_NAME"

          LINUX_APPIMAGE_NAME="AQWPocket-${TAG_VERSION}-x86_64.AppImage"
          LINUX_ARTIFACT_NAME="$LINUX_APPIMAGE_NAME"

          WINDOWS_EXE_NAME="AQWPocket-${TAG_VERSION}-windows-x64.exe"
          WINDOWS_ARTIFACT_NAME="$WINDOWS_EXE_NAME"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_artifact_name=${APK_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "linux_appimage_name=${LINUX_APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "linux_artifact_name=${LINUX_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "windows_exe_name=${WINDOWS_EXE_NAME}" >> "$GITHUB_OUTPUT"
          echo "windows_artifact_name=${WINDOWS_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

  build_universal_preview:
    name: Build Universal Preview APK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Generate preview signing keystore
        run: |
          mkdir -p .signing
          docker run --rm \
            -v "$PWD/.signing:/signing" \
            "$DOCKER_IMAGE" \
            keytool -genkeypair \
              -alias preview \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650 \
              -keystore /signing/pr-preview.jks \
              -storepass previewpass \
              -keypass previewpass \
              -dname "CN=AQW Pocket Preview, OU=CI, O=GitHub Actions, L=Unknown, S=Unknown, C=US"

      - name: Inject preview version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app.xml

      - name: Build universal preview APK
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e KEYSTORE_PATH=/workspace/.signing/pr-preview.jks \
            -e KEY_ALIAS=preview \
            -e KEYSTORE_PASS=previewpass \
            -e KEY_PASS=previewpass \
            "$DOCKER_IMAGE" \
            scripts/build-android.sh --target universal \
              --output "${{ needs.prepare.outputs.apk_name }}"

      - name: Clean signing keystore
        if: always()
        run: rm -rf .signing

      - name: Upload preview APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.apk_artifact_name }}
          path: build/${{ needs.prepare.outputs.apk_name }}
          archive: false
          if-no-files-found: error
          retention-days: 7

  build_linux_preview:
    name: Build Linux Preview AppImage
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Inject preview version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-linux.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-linux.xml

      - name: Build Linux AppImage
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            --privileged \
            "$DOCKER_IMAGE" \
            scripts/build-linux.sh \
              --output "${{ needs.prepare.outputs.linux_appimage_name }}"

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.linux_artifact_name }}
          path: build/${{ needs.prepare.outputs.linux_appimage_name }}
          archive: false
          if-no-files-found: error
          retention-days: 7

  build_windows_preview:
    name: Build Windows Preview Exe
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Inject preview version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-windows.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-windows.xml

      - name: Build Windows portable exe
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            scripts/build-windows.sh \
              --output "${{ needs.prepare.outputs.windows_exe_name }}"

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.prepare.outputs.windows_artifact_name }}
          path: build/${{ needs.prepare.outputs.windows_exe_name }}
          archive: false
          if-no-files-found: error
          retention-days: 7

  preview_status:
    name: Preview
    runs-on: ubuntu-latest
    needs: [build_universal_preview, build_linux_preview, build_windows_preview]
    if: always()
    steps:
      - name: Fail when preview pipeline fails
        run: |
          if [ "${{ needs.build_universal_preview.result }}" != "success" ]; then
            echo "Preview APK build failed."
            exit 1
          fi

          if [ "${{ needs.build_linux_preview.result }}" != "success" ]; then
            echo "Preview Linux AppImage build failed."
            exit 1
          fi

          if [ "${{ needs.build_windows_preview.result }}" != "success" ]; then
            echo "Preview Windows exe build failed."
            exit 1
          fi

          echo "All preview builds succeeded."

name: Build

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: "Version prefix (e.g. 1.0, 1.1, 2.0)"
        required: false
        default: "1.0"
      publish_release:
        description: "Create git tag and GitHub release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release (adds -pre suffix to tag)"
        required: false
        default: false
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: aqw-pocket-build

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version and flags
        id: meta
        run: |
          PREFIX="${{ github.event.inputs.version_prefix }}"
          LATEST_TAG="$(git tag --list "v${PREFIX}.*" | grep -E "^v${PREFIX}\.[0-9]+$" | sort -V | tail -n 1 || true)"

          if [ -n "$LATEST_TAG" ]; then
            PATCH_NUMBER="${LATEST_TAG##*.}"
            NEXT_PATCH="$((PATCH_NUMBER + 1))"
          else
            NEXT_PATCH="1"
          fi

          APP_VERSION="${PREFIX}.${NEXT_PATCH}"
          TAG_VERSION="v${APP_VERSION}"

          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            TAG_VERSION="${TAG_VERSION}-pre"
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          if [ "${{ github.event.inputs.publish_release }}" = "true" ]; then
            PUBLISH_RELEASE="true"
          else
            PUBLISH_RELEASE="false"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  build_universal:
    name: Build Universal APK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set output names
        id: meta
        run: |
          APK_NAME="AQWPocket-universal-${{ needs.prepare.outputs.tag_version }}.apk"
          ARTIFACT_NAME="universal-apk-${{ needs.prepare.outputs.tag_version }}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing Android signing secrets."
            exit 1
          fi

          mkdir -p .signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > .signing/release.jks

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app.xml

      - name: Build AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e KEYSTORE_PATH=/workspace/.signing/release.jks \
            -e KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -e KEYSTORE_PASS="$ANDROID_KEYSTORE_PASSWORD" \
            -e KEY_PASS="$ANDROID_KEYSTORE_PASSWORD" \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              echo "[1/5] Patching latest Game.swf..."
              java scripts/patch.java
              echo "[2/5] Preparing loader gamefiles..."
              mkdir -p app/gamefiles && cp assets/Game.swf app/gamefiles/Game.swf
              echo "[3/5] Building foreground ANE..."
              mkdir -p ane/build/as3/core ane/build/android/classes ane/build/android-dist app/extensions
              rm -rf ane/build/android-dist/res
              if [ -d ane/android/res ]; then cp -R ane/android/res ane/build/android-dist/res; fi
              cp app/src/core/ForegroundService.as ane/build/as3/core/ForegroundService.as
              compc -source-path ane/build/as3 -include-classes core.ForegroundService \
                -swf-version=23 -output ane/build/foreground.swc
              javac --release 8 \
                -cp "$ANDROID_JAR:$AIR_HOME/lib/android/FlashRuntimeExtensions.jar" \
                -d ane/build/android/classes ane/android/src/com/aqw/foreground/*.java
              jar cf ane/build/foreground-ext.jar -C ane/build/android/classes .
              java scripts/tools.java extract-library-swf \
                ane/build/foreground.swc ane/build/android-dist/library.swf
              cp ane/build/foreground-ext.jar ane/build/android-dist/foreground-ext.jar
              cp ane/extension.xml ane/build/extension.xml
              cp ane/platform-android.xml ane/build/android-dist/platform.xml
              adt -package -target ane ane/build/foreground.ane ane/build/extension.xml \
                -swc ane/build/foreground.swc \
                -platform Android-ARM -platformoptions ane/build/android-dist/platform.xml \
                  -C ane/build/android-dist foreground-ext.jar library.swf res \
                -platform Android-ARM64 -platformoptions ane/build/android-dist/platform.xml \
                  -C ane/build/android-dist foreground-ext.jar library.swf res
              cp ane/build/foreground.ane app/extensions/foreground.ane
              echo "[4/5] Compiling Loader.swf..."
              amxmlc -external-library-path+=app/extensions/foreground.ane \
                -output app/Loader.swf app/src/Main.as
              echo "[5/5] Building AAB..."
              mkdir -p build
              ICONS="icons/android-icon-36x36.png icons/android-icon-48x48.png icons/android-icon-72x72.png icons/android-icon-96x96.png icons/android-icon-144x144.png icons/android-icon-192x192.png"
              adt -package -target aab \
                -storetype JKS -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASS" -keypass "$KEY_PASS" \
                build/AQWPocket.aab app/app.xml -extdir app/extensions \
                -C app Loader.swf $ICONS gamefiles/Game.swf \
                -platformsdk "$ANDROID_SDK_ROOT"
              echo "Done."
            '

      - name: Normalize AAB native library compression
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            java scripts/tools.java normalize-aab build/AQWPocket.aab build/AQWPocket-normalized.aab

      - name: Build universal APK from normalized AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            sh -c "
              java -jar \$BUNDLETOOL_JAR build-apks \
                --bundle=build/AQWPocket-normalized.aab \
                --output=build/AQWPocket.apks \
                --mode=universal \
                --ks=/workspace/.signing/release.jks \
                --ks-key-alias=\"$ANDROID_KEY_ALIAS\" \
                --ks-pass=pass:\"$ANDROID_KEYSTORE_PASSWORD\" \
                --key-pass=pass:\"$ANDROID_KEYSTORE_PASSWORD\" &&
              unzip -p build/AQWPocket.apks universal.apk > \"build/${{ steps.meta.outputs.apk_name }}\" &&
              rm -f build/AQWPocket.apks build/AQWPocket-normalized.aab
            "

      - name: Inspect APK
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            java scripts/tools.java inspect-native-libs "build/${{ steps.meta.outputs.apk_name }}"

      - name: Clean signing keystore
        if: always()
        run: rm -rf .signing

      - name: Upload universal APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.apk_name }}
          if-no-files-found: error

  build_linux:
    name: Build Linux Bundle
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      archive_name: ${{ steps.meta.outputs.archive_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set output names
        id: meta
        run: |
          ARCHIVE_NAME="AQWPocket-linux-${{ needs.prepare.outputs.tag_version }}.tar.gz"
          ARTIFACT_NAME="linux-bundle-${{ needs.prepare.outputs.tag_version }}"
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-linux.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-linux.xml

      - name: Build Linux bundle
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e ARCHIVE_NAME="$ARCHIVE_NAME" \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              echo "[1/4] Patching latest Game.swf..."
              java scripts/patch.java
              echo "[2/4] Preparing loader gamefiles..."
              mkdir -p app/gamefiles && cp assets/Game.swf app/gamefiles/Game.swf
              echo "[3/4] Compiling Loader.swf (linux)..."
              amxmlc -output app/Loader.swf app/src/Main.as
              echo "[4/4] Packaging linux bundle..."
              mkdir -p build && rm -rf build/AQWPocket-linux
              adt -certificate -cn "AQW Pocket" 2048-RSA /tmp/bundle.p12 bundlepass
              adt -package \
                -storetype pkcs12 -keystore /tmp/bundle.p12 -storepass bundlepass \
                -target bundle build/AQWPocket-linux app/app-linux.xml \
                -C app Loader.swf \
                icons/android-icon-36x36.png icons/android-icon-48x48.png \
                icons/android-icon-72x72.png icons/android-icon-96x96.png \
                icons/android-icon-144x144.png icons/android-icon-192x192.png \
                gamefiles/Game.swf
              tar -czf "build/$ARCHIVE_NAME" -C build AQWPocket-linux
              rm -rf build/AQWPocket-linux
              echo "Done."
            '
        env:
          ARCHIVE_NAME: ${{ steps.meta.outputs.archive_name }}

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build_universal, build_linux]
    if: needs.prepare.outputs.publish_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_universal.outputs.artifact_name }}
          path: build

      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_linux.outputs.artifact_name }}
          path: build

      - name: Tag release
        run: |
          git tag -f ${{ needs.prepare.outputs.tag_version }}
          git push origin ${{ needs.prepare.outputs.tag_version }} --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ needs.prepare.outputs.tag_version }}" \
            "build/${{ needs.build_universal.outputs.apk_name }}" \
            "build/${{ needs.build_linux.outputs.archive_name }}" \
            --title "${{ needs.prepare.outputs.tag_version }}" \
            --generate-notes \
            $PRERELEASE_FLAG

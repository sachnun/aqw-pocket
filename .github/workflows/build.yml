name: Build

on:
  workflow_dispatch:
    inputs:
      version_prefix:
        description: "Version prefix (e.g. 1.0, 1.1, 2.0)"
        required: false
        default: "1.0"
      publish_release:
        description: "Create git tag and GitHub release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release (adds -pre suffix to tag)"
        required: false
        default: false
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: aqw-pocket-build

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      tag_version: ${{ steps.meta.outputs.tag_version }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version and flags
        id: meta
        run: |
          PREFIX="${{ github.event.inputs.version_prefix }}"
          LATEST_TAG="$(git tag --list "v${PREFIX}.*" | sed 's/-pre$//' | grep -E "^v${PREFIX}\.[0-9]+$" | sort -V | tail -n 1 || true)"

          if [ -n "$LATEST_TAG" ]; then
            PATCH_NUMBER="${LATEST_TAG##*.}"
            NEXT_PATCH="$((PATCH_NUMBER + 1))"
          else
            NEXT_PATCH="1"
          fi

          APP_VERSION="${PREFIX}.${NEXT_PATCH}"
          TAG_VERSION="v${APP_VERSION}"

          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            TAG_VERSION="${TAG_VERSION}-pre"
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          if [ "${{ github.event.inputs.publish_release }}" = "true" ]; then
            PUBLISH_RELEASE="true"
          else
            PUBLISH_RELEASE="false"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  build_universal:
    name: Build Universal APK
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set output names
        id: meta
        run: |
          APK_NAME="AQWPocket-universal-${{ needs.prepare.outputs.tag_version }}.apk"
          ARTIFACT_NAME="universal-apk-${{ needs.prepare.outputs.tag_version }}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing Android signing secrets."
            exit 1
          fi

          mkdir -p .signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > .signing/release.jks

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app.xml

      - name: Build universal APK
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e KEYSTORE_PATH=/workspace/.signing/release.jks \
            -e KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -e KEYSTORE_PASS="$ANDROID_KEYSTORE_PASSWORD" \
            -e KEY_PASS="$ANDROID_KEYSTORE_PASSWORD" \
            "$DOCKER_IMAGE" \
            scripts/build-android.sh --target universal \
              --output "${{ steps.meta.outputs.apk_name }}"

      - name: Clean signing keystore
        if: always()
        run: rm -rf .signing

      - name: Upload universal APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.apk_name }}
          if-no-files-found: error

  build_linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      appimage_name: ${{ steps.meta.outputs.appimage_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set output names
        id: meta
        run: |
          APPIMAGE_NAME="AQWPocket-${{ needs.prepare.outputs.tag_version }}-x86_64.AppImage"
          ARTIFACT_NAME="linux-appimage-${{ needs.prepare.outputs.tag_version }}"
          echo "appimage_name=${APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-linux.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-linux.xml

      - name: Build Linux AppImage
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            --privileged \
            "$DOCKER_IMAGE" \
            scripts/build-linux.sh \
              --output "${{ steps.meta.outputs.appimage_name }}"

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.appimage_name }}
          if-no-files-found: error

  build_windows:
    name: Build Windows Portable Exe
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      exe_name: ${{ steps.meta.outputs.exe_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set output names
        id: meta
        run: |
          EXE_NAME="AQWPocket-${{ needs.prepare.outputs.tag_version }}-windows-x64.exe"
          ARTIFACT_NAME="windows-exe-${{ needs.prepare.outputs.tag_version }}"
          echo "exe_name=${EXE_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Pull build image
        run: |
          docker pull ghcr.io/sachnun/aqw-pocket:build
          docker tag ghcr.io/sachnun/aqw-pocket:build ${{ env.DOCKER_IMAGE }}

      - name: Inject version into source files
        run: |
          sed -i "s/APP_VERSION:String = \".*\"/APP_VERSION:String = \"${{ needs.prepare.outputs.tag_version }}\"/" app/src/Config.as
          sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ needs.prepare.outputs.app_version }}</versionNumber>|" app/app-windows.xml
          sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ needs.prepare.outputs.tag_version }}</versionLabel>|" app/app-windows.xml

      - name: Build Windows portable exe
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$DOCKER_IMAGE" \
            scripts/build-windows.sh \
              --output "${{ steps.meta.outputs.exe_name }}"

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/${{ steps.meta.outputs.exe_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build_universal, build_linux, build_windows]
    if: needs.prepare.outputs.publish_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_universal.outputs.artifact_name }}
          path: build

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_linux.outputs.artifact_name }}
          path: build

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_windows.outputs.artifact_name }}
          path: build

      - name: Tag release
        run: |
          git tag -f ${{ needs.prepare.outputs.tag_version }}
          git push origin ${{ needs.prepare.outputs.tag_version }} --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release delete "${{ needs.prepare.outputs.tag_version }}" --yes 2>/dev/null || true

          gh release create "${{ needs.prepare.outputs.tag_version }}" \
            "build/${{ needs.build_universal.outputs.apk_name }}" \
            "build/${{ needs.build_linux.outputs.appimage_name }}" \
            "build/${{ needs.build_windows.outputs.exe_name }}" \
            --title "${{ needs.prepare.outputs.tag_version }}" \
            --generate-notes \
            $PRERELEASE_FLAG
